<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Comissões – Podemos</title>
  <link rel="stylesheet" href="panel.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== LAYOUT COMISSÕES ===== */
    .com-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .com-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .com-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .com-tab {
      flex: 1;
      padding: 10px 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-align: center;
      color: var(--text-dim);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .com-tab.ativo {
      color: var(--accent-light);
      border-bottom-color: var(--accent);
    }

    .com-busca-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .com-busca {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }
    .com-busca::placeholder { color: var(--text-dim); }
    .com-busca:focus { border-color: var(--accent); }

    .com-lista {
      flex: 1;
      overflow-y: auto;
    }

    .com-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .com-item:hover { background: rgba(31,165,165,.07); }
    .com-item.ativo  { background: rgba(31,165,165,.15); }

    .com-item-sigla {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent-light);
      min-width: 54px;
    }
    .com-item-nome {
      font-size: 12px;
      color: var(--text);
      line-height: 1.35;
      flex: 1;
    }
    .com-item-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      min-width: 20px;
      text-align: right;
    }
    .com-item-badge.tem-membro { color: var(--accent-light); }

    /* ===== PAINEL CENTRAL ===== */
    .com-painel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .com-painel-header {
      padding: 16px 24px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .com-painel-titulo {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .com-painel-sigla {
      font-size: 12px;
      color: var(--accent-light);
      font-weight: 600;
      margin-top: 2px;
    }

    .com-painel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .com-grupo {
      margin-bottom: 28px;
    }

    .com-grupo-titulo {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .com-grupo-titulo .badge-count {
      background: var(--accent-muted);
      color: var(--accent-light);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 600;
    }

    .com-membro-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .com-membro-nome {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .com-membro-uf {
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.06);
      padding: 2px 8px;
      border-radius: 6px;
    }

    .com-membro-alerta {
      font-size: 11px;
      color: #f0c040;
      font-weight: 600;
    }

    .btn-remover-membro {
      background: none;
      border: 1px solid rgba(240,84,84,.35);
      border-radius: 6px;
      color: var(--vermelho);
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: background .12s;
    }
    .btn-remover-membro:hover { background: rgba(240,84,84,.12); }

    .btn-adicionar-membro {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px dashed var(--border-soft);
      border-radius: 10px;
      color: var(--accent);
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: border-color .12s, background .12s;
    }
    .btn-adicionar-membro:hover {
      border-color: var(--accent);
      background: var(--accent-muted);
    }

    /* ===== VIEW POR DEPUTADO ===== */
    .dep-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .dep-row-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dep-row-nome {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .dep-row-uf {
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.06);
      padding: 2px 8px;
      border-radius: 6px;
    }
    .dep-row-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }
    .dep-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
    }
    .dep-tag.titular { background: rgba(31,165,165,.18); color: var(--accent-light); }
    .dep-tag.suplente { background: rgba(255,255,255,.07); color: var(--text-dim); }
    .dep-tag.conflito { background: rgba(240,192,64,.18); color: #f0c040; }

    /* ===== VIEW ALERTAS ===== */
    .alerta-card {
      background: rgba(240,192,64,.08);
      border: 1px solid rgba(240,192,64,.3);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 12px;
    }
    .alerta-nome {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .alerta-desc {
      font-size: 12px;
      color: #f0c040;
      line-height: 1.5;
    }

    /* ===== EMPTY STATE ===== */
    .com-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 100%;
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      padding: 40px;
    }

    /* ===== MODAL DEPUTADOS ===== */
    .dep-modal-lista {
      max-height: 280px;
      overflow-y: auto;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .dep-modal-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .dep-modal-nome { flex: 1; font-size: 13px; color: var(--text); }
    .dep-modal-uf {
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(255,255,255,.06);
      padding: 2px 8px;
      border-radius: 6px;
    }

    /* ===== MODAL ADICIONAR MEMBRO ===== */
    .membro-select-lista {
      max-height: 260px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .membro-select-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .membro-select-item:hover { background: var(--accent-muted); border-color: var(--accent); }
    .membro-select-item.ja-membro { opacity: .4; cursor: not-allowed; pointer-events: none; }
    .membro-select-nome { flex: 1; font-size: 13px; color: var(--text); }
    .membro-select-uf {
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(255,255,255,.06);
      padding: 2px 8px;
      border-radius: 6px;
    }
    .membro-select-conflito {
      font-size: 10px;
      color: #f0c040;
      font-weight: 600;
    }

    /* ===== SPINNER ===== */
    .com-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* ===== VAGAS COUNTER ===== */
    .vagas-counter {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 8px;
      margin-left: 6px;
    }
    .vagas-ok      { background: rgba(31,165,165,.18); color: var(--accent-light); }
    .vagas-cheias  { background: rgba(240,84,84,.18);  color: var(--vermelho); }
    .vagas-zero    { background: rgba(255,255,255,.07); color: var(--text-dim); }

    .com-grupo-acoes {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .btn-transferencia {
      background: none;
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      color: var(--text-dim);
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: background .12s, border-color .12s, color .12s;
    }
    .btn-transferencia:hover { border-color: var(--accent); color: var(--accent-light); background: var(--accent-muted); }
    .btn-transferencia.ceder:hover  { border-color: var(--vermelho); color: var(--vermelho); background: rgba(240,84,84,.08); }

    /* ===== HISTÓRICO TRANSFERÊNCIAS ===== */
    .transf-secao {
      margin-top: 24px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .transf-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 5px;
      font-size: 12px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
    }

    .transf-icone { font-size: 14px; flex-shrink: 0; }
    .transf-texto { flex: 1; color: var(--text); line-height: 1.4; }
    .transf-data  { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }

    .btn-desfazer {
      background: none;
      border: 1px solid rgba(240,84,84,.3);
      border-radius: 5px;
      color: var(--vermelho);
      padding: 2px 8px;
      font-size: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-desfazer:hover { background: rgba(240,84,84,.1); }

    /* ===== CONFIG VAGAS MODAL ===== */
    .config-vagas-header {
      display: grid;
      grid-template-columns: 1fr 80px 80px;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255,255,255,.04);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .config-vagas-lista {
      max-height: 420px;
      overflow-y: auto;
    }

    .config-vaga-row {
      display: grid;
      grid-template-columns: 1fr 80px 80px;
      gap: 8px;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
    }
    .config-vaga-row:last-child { border-bottom: none; }

    .config-vaga-nome {
      font-size: 12px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .config-vaga-sigla {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent-light);
      letter-spacing: 0.4px;
    }

    .config-vaga-input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      outline: none;
    }
    .config-vaga-input:focus { border-color: var(--accent); }

    /* Botão adicionar desabilitado por falta de vagas */
    .btn-adicionar-membro:disabled,
    .btn-adicionar-membro.btn-add-bloqueado {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* badge na sidebar para sem vagas */
    .badge-sem-vagas {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,.07);
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <!-- ===== CABEÇALHO ===== -->
  <header class="app-header">
    <div class="header-brand">
      <div class="header-logo">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
          <circle cx="17" cy="17" r="17" fill="#00A859"/>
          <text x="17" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="Arial">P</text>
        </svg>
      </div>
      <div class="header-title">
        <span class="header-main">Controle de Comissões</span>
        <span class="header-sub">Liderança do Podemos – Câmara dos Deputados</span>
      </div>
    </div>
    <div class="header-actions">
      <button id="btn-config-vagas" class="btn btn-outline btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Vagas
      </button>
      <button id="btn-gerir-deputados" class="btn btn-outline btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11"/><line x1="20" y1="8" x2="20" y2="14"/></svg>
        Deputados
      </button>
      <button id="btn-exportar-excel" class="btn btn-primary btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar Excel
      </button>
    </div>
  </header>

  <!-- ===== LAYOUT PRINCIPAL ===== -->
  <div class="app-body com-layout">

    <!-- SIDEBAR -->
    <aside class="com-sidebar">
      <div class="com-tabs">
        <button class="com-tab ativo" data-view="comissao">Por Comissão</button>
        <button class="com-tab" data-view="deputado">Por Deputado</button>
        <button class="com-tab" data-view="alertas">Alertas</button>
      </div>

      <div class="com-busca-wrap" id="busca-wrap">
        <input type="text" class="com-busca" id="com-busca" placeholder="Buscar...">
      </div>

      <div class="com-lista" id="com-lista"></div>
    </aside>

    <!-- PAINEL CENTRAL -->
    <main class="com-painel">
      <div id="com-painel-conteudo" class="com-painel-body">
        <div class="com-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Selecione uma comissão para ver os membros</span>
        </div>
      </div>
    </main>

  </div>

  <!-- ===== MODAL: GERIR DEPUTADOS ===== -->
  <div id="modal-deputados" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>Bancada Podemos</h3>
        <button class="modal-close" data-fecha="modal-deputados">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="display:flex;gap:8px;margin-bottom:14px">
          <input type="text" id="dep-nome-input" class="form-input" placeholder="Nome do deputado" style="flex:1">
          <select id="dep-uf-input" class="form-input" style="width:80px">
            <option value="">UF</option>
            <option>AC</option><option>AL</option><option>AM</option><option>AP</option>
            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
            <option>GO</option><option>MA</option><option>MG</option><option>MS</option>
            <option>MT</option><option>PA</option><option>PB</option><option>PE</option>
            <option>PI</option><option>PR</option><option>RJ</option><option>RN</option>
            <option>RO</option><option>RR</option><option>RS</option><option>SC</option>
            <option>SE</option><option>SP</option><option>TO</option>
          </select>
          <button id="btn-add-deputado" class="btn btn-primary btn-sm">Adicionar</button>
        </div>
        <div class="dep-modal-lista" id="dep-modal-lista"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-fecha="modal-deputados">Fechar</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: ADICIONAR MEMBRO ===== -->
  <div id="modal-add-membro" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3 id="add-membro-titulo">Adicionar Titular</h3>
        <button class="modal-close" data-fecha="modal-add-membro">✕</button>
      </div>
      <div class="modal-body">
        <p id="add-membro-desc" style="font-size:12px;color:var(--text-dim);margin-bottom:12px"></p>
        <div class="membro-select-lista" id="membro-select-lista"></div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: CONFIGURAR VAGAS ===== -->
  <div id="modal-config-vagas" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:560px;width:95vw">
      <div class="modal-header">
        <h3>Configurar Vagas por Comissão</h3>
        <button class="modal-close" data-fecha="modal-config-vagas">✕</button>
      </div>
      <div class="modal-body" style="padding:0">
        <div class="config-vagas-header">
          <span>Comissão</span>
          <span style="text-align:center">Titular</span>
          <span style="text-align:center">Suplente</span>
        </div>
        <div id="config-vagas-lista" class="config-vagas-lista"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-fecha="modal-config-vagas">Cancelar</button>
        <button id="btn-salvar-vagas" class="btn btn-primary">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: TRANSFERÊNCIA DE VAGA ===== -->
  <div id="modal-transferencia" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3 id="transf-titulo">Ceder Vaga</h3>
        <button class="modal-close" data-fecha="modal-transferencia">✕</button>
      </div>
      <div class="modal-body">
        <p id="transf-desc" style="font-size:12px;color:var(--text-dim);margin-bottom:16px"></p>
        <div class="form-group">
          <label id="transf-partido-label">Partido destinatário</label>
          <input type="text" id="transf-partido" class="form-input" placeholder="Ex: MDB, PSDB, PP...">
        </div>
        <div class="form-group">
          <label>Observação (opcional)</label>
