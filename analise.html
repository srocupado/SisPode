<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Análise da Pauta – Podemos</title>
  <link rel="stylesheet" href="panel.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .an-wrap {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .an-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .an-topbar-info {
      flex: 1;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .an-topbar-info .title  { font-size: 14px; font-weight: 600; color: var(--text); }
    .an-topbar-info .meta   { font-size: 12px; color: var(--text-dim); }

    .an-topbar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .an-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px 40px;
      background: var(--bg);
    }

    .an-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      font-size: 13px;
    }
    .an-empty svg { display: block; margin: 0 auto 14px; opacity: .5; }

    .an-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 14px;
      overflow: hidden;
      transition: border-color .15s;
    }
    .an-card:hover { border-color: var(--border-soft); }

    .an-card-head {
      display: flex;
      gap: 12px;
      padding: 14px 16px;
      align-items: flex-start;
    }

    .an-card-num {
      flex-shrink: 0;
      min-width: 30px;
      height: 30px;
      padding: 0 8px;
      border-radius: 6px;
      background: rgba(31,165,165,.15);
      color: var(--accent-light);
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .an-card-info { flex: 1; min-width: 0; }

    .an-card-tipo {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .4px;
      color: var(--accent-light);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .an-card-titulo {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .an-card-ementa {
      font-size: 12.5px;
      color: var(--text-dim);
      line-height: 1.55;
      margin-bottom: 6px;
    }

    .an-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      font-size: 11.5px;
      color: var(--text-dim);
      margin-top: 6px;
    }
    .an-card-meta b { color: var(--text); font-weight: 600; }

    .an-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

    .an-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .2px;
    }
    .an-badge--pode   { background: rgba(0,168,89,.18);   color: #2fcf7a; border: 1px solid rgba(0,168,89,.35); }
    .an-badge--apens  { background: rgba(31,165,165,.18); color: var(--accent-light); border: 1px solid rgba(31,165,165,.35); }
    .an-badge--urg    { background: rgba(255,170,0,.16);  color: #ffcc66; border: 1px solid rgba(255,170,0,.35); }
    .an-badge--neutro { background: rgba(255,255,255,.06);color: var(--text-dim); border: 1px solid var(--border-soft); }

    .an-card-actions {
      display: flex;
      gap: 8px;
      padding: 0 16px 14px;
      flex-wrap: wrap;
    }

    .an-analise {
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      background: rgba(255,255,255,.02);
      display: none;
    }
    .an-analise.aberto { display: block; }

    .an-analise-head {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .an-analise-meta {
      flex: 1;
      font-size: 11px;
      color: var(--text-dim);
      min-width: 200px;
    }

    .an-analise-conteudo {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      max-width: none;
    }
    .an-analise-conteudo h1,
    .an-analise-conteudo h2,
    .an-analise-conteudo h3 {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--accent-light);
      margin: 14px 0 6px;
      letter-spacing: .2px;
    }
    .an-analise-conteudo h1:first-child,
    .an-analise-conteudo h2:first-child,
    .an-analise-conteudo h3:first-child { margin-top: 0; }
    .an-analise-conteudo ul { margin: 4px 0 8px 18px; padding: 0; }
    .an-analise-conteudo li { margin-bottom: 4px; }
    .an-analise-conteudo p  { margin: 4px 0 8px; }
    .an-analise-conteudo strong { color: var(--text); }
    .an-analise-conteudo code   {
      background: rgba(255,255,255,.07);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    .an-analise-erro {
      color: #ff8e8e;
      font-size: 12.5px;
      padding: 10px 12px;
      background: rgba(255,80,80,.08);
      border: 1px solid rgba(255,80,80,.25);
      border-radius: 6px;
    }

    .an-progress {
      font-size: 12px;
      color: var(--text-dim);
      padding: 8px 0;
    }

    .an-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border-soft);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .an-secao-titulo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin: 6px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .an-secao-titulo:not(:first-child) { margin-top: 22px; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-brand">
      <div class="header-logo">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
          <circle cx="17" cy="17" r="17" fill="#00A859"/>
          <text x="17" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="Arial">P</text>
        </svg>
      </div>
      <div class="header-title">
        <span class="header-main">Análise da Pauta</span>
        <span class="header-sub">Liderança do Podemos – Câmara dos Deputados</span>
      </div>
    </div>
    <div class="header-actions">
      <button id="btn-voltar" class="btn btn-outline btn-sm" title="Voltar">← Início</button>
      <button id="btn-exportar-pdf" class="btn btn-primary btn-sm" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar PDF
      </button>
    </div>
  </header>

  <div class="an-wrap">

    <div class="an-topbar">
      <div class="an-topbar-info">
        <span class="title" id="pauta-titulo">Nenhuma pauta carregada</span>
        <span class="meta"  id="pauta-meta">Carregue o PDF da Pauta da Semana para começar</span>
      </div>
      <div class="an-topbar-actions">
        <label for="input-pauta-pdf" class="btn btn-outline btn-sm" style="cursor:pointer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Carregar pauta (PDF)
        </label>
        <input type="file" id="input-pauta-pdf" accept=".pdf" style="display:none">
      </div>
    </div>

    <main class="an-body">
      <div id="lista-itens">
        <div class="an-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <p>Carregue o PDF da Pauta da Semana para listar projetos e requerimentos.</p>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" style="display:none"></div>

  <script src="libs/pdf.min.js"></script>
  <script src="libs/html2canvas.min.js"></script>
  <script src="analise.js"></script>
</body>
</html>
